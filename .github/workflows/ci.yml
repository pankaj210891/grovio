name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: "true"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Local Turborepo cache — speeds up unchanged packages.
      # For Vercel remote cache: add TURBO_TOKEN and TURBO_TEAM to GitHub Secrets
      # and pass --token=${{ secrets.TURBO_TOKEN }} --team=${{ secrets.TURBO_TEAM }}
      - name: Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('turbo.json') }}-
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Format check
        run: pnpm turbo run format:check

      - name: Test
        run: pnpm turbo run test -- --passWithNoTests

      - name: Build
        run: pnpm turbo run build
