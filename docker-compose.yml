# Grovio — Local Development Infrastructure Services
#
# Run minimum required services:
#   docker-compose up -d postgres redis
#
# Run all services (OpenSearch only needed for Phase 3+ search features):
#   docker-compose up -d
#
# Stop services (keep data):
#   docker-compose down
#
# Destroy all data volumes:
#   docker-compose down -v
#
# NOTE: Credentials here are LOCAL DEVELOPMENT ONLY.
# Buyers MUST change all passwords before any production deployment.
# OpenSearch security plugin is disabled for local dev convenience only;
# production deployments must enable security plugin and configure TLS.

version: '3.9'

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: grovio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grovio
      POSTGRES_PASSWORD: grovio
      POSTGRES_DB: grovio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grovio -d grovio']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grovio_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── OpenSearch 2.18 (needed for Phase 3+ product search) ─────────────────
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: grovio_opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      # Security plugin disabled for local dev only.
      # Production: remove this line and configure TLS + users.
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Grovio@123
      - bootstrap.memory_lock=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
      - '9600:9600'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health || exit 1']
      interval: 20s
      timeout: 10s
      retries: 10

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  opensearch_data:
    driver: local
